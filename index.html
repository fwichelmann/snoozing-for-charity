<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snooze for Charity</title>
    <style>
        :root { --orange: #ff9800; --red: #ff3b30; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); color: #fff; 
            font-family: -apple-system, sans-serif; 
            margin: 0; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: space-around; padding: 40px 20px;
            transition: background 0.5s; overflow: hidden;
        }

        .header { text-align: center; }
        .logo { height: 70px; margin-bottom: 10px; }
        
        /* Guthaben-Anzeige */
        .balance-card { background: #1c1c1e; padding: 10px 25px; border-radius: 15px; }
        .balance-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #balance { font-size: 1.8rem; font-weight: bold; color: var(--orange); display: block; }

        /* Live Uhrzeit */
        #live-clock { font-size: 5.5rem; font-weight: 100; letter-spacing: -2px; margin: 10px 0; }

        /* Wecker-Einstellung */
        .alarm-settings { opacity: 0.6; }
        .alarm-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        #alarm-time { 
            background: transparent; border: none; color: #fff; 
            font-size: 1.8rem; font-family: inherit; text-align: center; outline: none;
        }

        /* Snooze Button */
        .snooze-btn { 
            width: 200px; height: 200px; border-radius: 50%; 
            background: var(--orange); border: none; color: #000; 
            font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 40px rgba(255,152,0,0.3);
        }
        .snooze-btn:active { transform: scale(0.92); }
        .snooze-btn small { display: block; font-size: 0.8rem; opacity: 0.7; }

        /* Alarm-Effekt */
        body.alarm-active { background-color: var(--red); animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { background: #600; } 50% { background: #f00; } }
        
        .test-btn { font-size: 0.7rem; color: #333; text-decoration: none; border: 1px solid #222; padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="assets/logo.png" class="logo" alt="Logo">
        <div class="balance-card">
            <span class="balance-label">Spenden-Guthaben</span>
            <span id="balance">10.00 €</span>
        </div>
    </div>

    <!-- Live Uhrzeit Berlin -->
    <div id="live-clock">00:00</div>

    <div class="alarm-settings">
        <div class="alarm-label">Wecker gestellt auf:</div>
        <input type="time" id="alarm-time" value="08:00">
    </div>

    <button class="snooze-btn" onclick="snooze()">SNOOZE<small>- 0,05 €</small></button>

    <div class="test-btn" onclick="testAlarm()">TEST-ALARM (5 SEK.)</div>

    <audio id="alarm-sound" loop preload="auto">
        <source src="assets/alarm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Logik für das Guthaben (Startwert 10€ falls leer)
        let guthaben = localStorage.getItem('snooze_balance');
        if (guthaben === null) {
            guthaben = 10.00;
            localStorage.setItem('snooze_balance', guthaben);
        } else {
            guthaben = parseFloat(guthaben);
        }

        let isAlarming = false;
        let lastSnoozeMinute = -1;

        const balanceDisplay = document.getElementById('balance');
        const alarmInput = document.getElementById('alarm-time');
        const sound = document.getElementById('alarm-sound');

        // Initialisierung
        balanceDisplay.innerText = guthaben.toFixed(2) + " €";
        alarmInput.value = localStorage.getItem('alarm_time') || "08:00";

        // 1. Echtzeit-Uhr (Berlin)
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('live-clock').innerText = timeStr;
            
            // Wecker-Check
            const currentHM = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            if (currentHM === alarmInput.value && !isAlarming && now.getMinutes() !== lastSnoozeMinute) {
                triggerAlarm();
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        function triggerAlarm() {
            isAlarming = true;
            document.body.classList.add('alarm-active');
            sound.play().catch(() => console.log("Sound blockiert"));
        }

        function snooze() {
            if (isAlarming) {
                // Geld abziehen
                guthaben -= 0.05;
                balanceDisplay.innerText = guthaben.toFixed(2) + " €";
                localStorage.setItem('snooze_balance', guthaben);

                // Stop & Pause
                lastSnoozeMinute = new Date().getMinutes();
                isAlarming = false;
                document.body.classList.remove('alarm-active');
                sound.pause();
                sound.currentTime = 0;

                // Zeit +5 Min
                let [h, m] = alarmInput.value.split(':').map(Number);
                m += 5;
                if (m >= 60) { m -= 60; h = (h + 1) % 24; }
                alarmInput.value = h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
                localStorage.setItem('alarm_time', alarmInput.value);
            }
        }

        function testAlarm() { setTimeout(triggerAlarm, 5000); }
    </script>
</body>
</html>
