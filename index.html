<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoozing for Charity</title>
    <style>
        :root { --orange: #ff9800; --red: #b71c1c; --grey: #888; }
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: background 0.5s; overflow: hidden; user-select: none; }
        
        .logo { max-height: 120px; margin-bottom: 10px; transition: all 0.5s ease-in-out; }
        .stats { color: var(--grey); font-size: 1.4rem; margin-bottom: 5px; }
        #balance { color: #fff; font-weight: bold; }
        
        .charity-picker { background: #222; border: 1px solid #444; color: #4caf50; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 20px; outline: none; appearance: none; }
        
        #alarm-time { background: transparent; border: none; color: var(--orange); font-size: 5rem; font-family: inherit; font-weight: 100; text-align: center; outline: none; }

        .snooze-btn { width: 220px; height: 220px; border-radius: 50%; background-color: var(--orange); border: none; color: #000; font-size: 1.6rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; box-shadow: 0 10px 40px rgba(255,152,0,0.3); }
        .snooze-btn:active { transform: scale(0.9); }
        .snooze-btn small { display: block; font-size: 0.8rem; opacity: 0.8; }

        /* Alarm-Zustand */
        body.alarm-active { background-color: var(--red); animation: flash 0.8s infinite; }
        body.alarm-active .logo { transform: scale(1.2) rotate(5deg); }
        
        @keyframes flash { 0% { background-color: #600; } 50% { background-color: #f00; } 100% { background-color: #600; } }
        
        .controls { margin-top: 30px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

    <img src="assets/logo.png" class="logo" alt="Logo">
    
    <div class="stats">Spendenstand: <span id="balance">0.00</span> €</div>
    
    <select id="charity-select" class="charity-picker" onchange="saveSettings()">
        <option>Ocean Cleanup 🌊</option>
        <option>Trees for Future 🌳</option>
        <option>Tierheim Berlin 🐾</option>
    </select>

    <input type="time" id="alarm-time" value="08:00" onchange="saveSettings()">

    <button class="snooze-btn" onclick="snooze()">SNOOZE<small>-0,05 €</small></button>

    <div class="controls" onclick="testAlarm()">🔔 Test-Alarm (5 Sek.)</div>

    <audio id="alarm-sound" loop preload="auto">
        <source src="assets/alarm.mp3" type="audio/mpeg">
    </audio>

    <script>
        let guthaben = parseFloat(localStorage.getItem('snooze_balance')) || 0.00;
        let isAlarming = false;
        let lastSnoozeMinute = -1; // Verhindert Sofort-Re-Trigger

        const sound = document.getElementById('alarm-sound');
        const balanceDisplay = document.getElementById('balance');
        const alarmInput = document.getElementById('alarm-time');

        // Laden
        balanceDisplay.innerText = guthaben.toFixed(2);
        alarmInput.value = localStorage.getItem('alarm_time') || "08:00";

        function saveSettings() {
            localStorage.setItem('alarm_time', alarmInput.value);
            localStorage.setItem('selected_charity', document.getElementById('charity-select').value);
        }

        // Wecker-Check
        setInterval(() => {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            // Nur triggern, wenn Zeit matcht, Alarm nicht schon läuft und wir nicht gerade in dieser Minute gesnoozed haben
            if (currentTime === alarmInput.value && !isAlarming && now.getMinutes() !== lastSnoozeMinute) {
                triggerAlarm();
            }
        }, 1000);

        function triggerAlarm() {
            isAlarming = true;
            document.body.classList.add('alarm-active');
            sound.play().catch(e => console.log("Sound-Play blockiert: User muss erst interagieren."));
        }

        function snooze() {
            if (isAlarming) {
                // Geld abziehen
                guthaben += 0.05; // Oder abziehen, je nach Logik
                balanceDisplay.innerText = guthaben.toFixed(2);
                localStorage.setItem('snooze_balance', guthaben);

                // Minute merken, um Re-Trigger zu verhindern
                lastSnoozeMinute = new Date().getMinutes();

                // Stop
                isAlarming = false;
                document.body.classList.remove('alarm-active');
                sound.pause();
                sound.currentTime = 0;

                // Zeit +5 Min
                let [h, m] = alarmInput.value.split(':').map(Number);
                m += 5;
                if (m >= 60) { m -= 60; h = (h + 1) % 24; }
                alarmInput.value = h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
                saveSettings();
            }
        }

        function testAlarm() {
            console.log("Test startet...");
            setTimeout(triggerAlarm, 5000);
        }
    </script>
</body>
</html>
